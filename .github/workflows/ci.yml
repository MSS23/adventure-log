name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  NODE_VERSION: "20"

jobs:
  ci:
    name: 🔍 Continuous Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔧 Generate Prisma Client
        run: npx prisma generate

      - name: 📋 Validate Prisma Schema
        run: npx prisma migrate diff --from-empty --to-schema-datamodel prisma/schema.prisma

      - name: 🔍 Environment Validation
        run: |
          echo "Testing environment variable validation..."
          # Test that our env.ts validation works
          node -e "
            process.env.NODE_ENV = 'test';
            try { require('./src/env.ts'); console.log('✅ Environment validation passed'); } 
            catch (e) { console.error('❌ Environment validation failed:', e.message); process.exit(1); }
          "

      - name: 🔧 TypeScript Type Check
        run: npm run type-check

      - name: 🧹 ESLint Check
        run: npm run lint --max-warnings 0

      - name: 🧪 Run Unit Tests
        run: npm run test --ci --coverage --watchAll=false --passWithNoTests
        env:
          NODE_ENV: test

      - name: 🧪 Run API Tests
        run: npm run test:api:coverage
        env:
          NODE_ENV: test

      - name: 🏗️ Build Application
        run: npm run build
        env:
          NODE_ENV: production
          SKIP_ENV_VALIDATION: true

      - name: 🎭 Playwright API Smoke Tests
        run: |
          echo "Setting up Playwright smoke tests..."
          npx playwright install --with-deps
          # Run only tests tagged with @smoke for API endpoints
          npx playwright test --grep="@smoke" --project=chromium --reporter=junit
        env:
          NODE_ENV: test
        continue-on-error: true

      - name: 📊 Upload Test Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage/
            test-results/
            playwright-report/
          retention-days: 30

      - name: 📊 Upload JUnit Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            junit.xml
            test-results/junit.xml
            playwright-results.xml
          retention-days: 30

      - name: 📝 Comment PR with Test Results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && failure()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚨 CI Build Failed
              
              The continuous integration checks have failed. Please review the following:
              
              - ✅ **Environment Validation**: Check that all required environment variables are properly configured
              - ✅ **Type Safety**: Run \`npm run type-check\` locally to fix TypeScript errors  
              - ✅ **Code Quality**: Run \`npm run lint\` locally to fix ESLint issues
              - ✅ **Unit Tests**: Run \`npm run test\` locally to ensure all tests pass
              - ✅ **Build Process**: Run \`npm run build\` locally to verify the build succeeds
              
              Please fix the issues and push your changes to trigger a new CI run.
              
              **Debug Tips:**
              - Check the Actions tab for detailed error logs
              - Run the pre-commit hooks locally: \`npx lint-staged\`
              - Verify all dependencies are up to date: \`npm run install\`
              `
            })

  security:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🛡️ Security Audit
        run: npm audit --audit-level moderate

      - name: 🔍 Check for vulnerabilities
        run: |
          echo "Checking for high-severity vulnerabilities..."
          npm audit --audit-level high --json > audit-results.json || true

          # Parse results and comment on PR if vulnerabilities found
          if [ -s audit-results.json ]; then
            echo "⚠️  Security vulnerabilities detected"
            cat audit-results.json
            exit 1
          else
            echo "✅ No high-severity vulnerabilities found"
          fi

  # Optional: Dependency Updates Check
  dependency-review:
    name: 📦 Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-ghsas: ""
