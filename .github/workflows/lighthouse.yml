name: Lighthouse CI

on:
  pull_request:
    branches: [main, master]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build

      - name: Start Next.js server in background
        run: |
          npm run start &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build
          PORT: '3000'

      - name: Wait for server to be reachable
        run: npx -y wait-on --timeout 120000 http://localhost:3000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          # Only audit public, unauthenticated routes — /albums and /globe
          # require auth and will redirect, producing meaningless scores.
          urls: |
            http://localhost:3000/
            http://localhost:3000/login
            http://localhost:3000/signup
          uploadArtifacts: true
          temporaryPublicStorage: true
        # Don't fail the entire PR for Lighthouse score regressions —
        # the artifacts are still uploaded for review.
        continue-on-error: true

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" || true
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: '.lighthouseci'
