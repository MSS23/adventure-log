name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at midnight UTC
    - cron: '0 0 * * 1'

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run npm audit (production only)
        run: npm audit --audit-level=critical --omit=dev

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # JS/TS doesn't need a build artifact — CodeQL extracts directly
          # from source. `build-mode: none` skips the autobuild step which
          # was failing (Next.js autobuild requires real env vars to build,
          # CI placeholders aren't enough). This is the GitHub-recommended
          # mode for JS/TS as of CodeQL Action v3.
          build-mode: none
          # Default query suite is "code-scanning" — security-and-quality
          # is broader but louder. Stick with the default for sane signal.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
        # CodeQL findings get uploaded to the Security tab regardless;
        # don't block PR merges on them while the team triages the
        # initial baseline. Flip this to false once the alert backlog
        # is at zero / accepted.
        continue-on-error: true

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TruffleHog needs the full history on push events; on PRs it
          # diffs base..head so a depth of 0 is also fine.
          fetch-depth: 0

      - name: Run TruffleHog (secrets scan)
        uses: trufflesecurity/trufflehog@main
        with:
          # On a PR, scan only the diff between base and head — fast and
          # avoids re-flagging existing repo state. On push to main, scan
          # the full history once.
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --results=verified,unknown
